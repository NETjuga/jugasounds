<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JUGASTRACKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root {
  --bg:      #0d0d0d;
  --surface: #161616;
  --lift:    #1f1f1f;
  --border:  rgba(255,255,255,0.06);
  --accent:  #d4f04a;
  --accent2: #b8d438;
  --text:    #f2f2f2;
  --muted:   #888;
  --faint:   #444;
  --r:       14px;
  --r-sm:    8px;
}

/* ─────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
img { display: block; }
button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--lift); border-radius: 2px; }

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(13,13,13,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1;
}
.logo em { color: var(--accent); font-style: normal; }
.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────
   PAGE
───────────────────────────────────────── */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 16px 140px;
}

/* ─────────────────────────────────────────
   SONG GRID
───────────────────────────────────────── */
.grid-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
  padding: 0 4px;
}
.song-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}
@media (min-width: 600px) {
  .song-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; }
}
@media (min-width: 900px) {
  .song-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

.song-card {
  background: var(--surface);
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s;
  position: relative;
  -webkit-user-select: none; user-select: none;
}
.song-card:hover { transform: translateY(-3px); border-color: rgba(212,240,74,0.25); }
.song-card:active { transform: scale(0.97); }
.song-card.is-playing { border-color: var(--accent); }

.card-art-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--lift); }
.card-art { width: 100%; height: 100%; object-fit: cover; }
.card-art-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; background: var(--lift);
}

/* play overlay on hover */
.card-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.song-card:hover .card-overlay,
.song-card.is-playing .card-overlay { opacity: 1; }
.card-play-icon {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-play-icon svg { color: #000; margin-left: 3px; }
.card-play-icon.paused-icon svg { margin-left: 0; }

/* EQ bars for playing card */
.card-eq {
  position: absolute; top: 10px; right: 10px;
  display: flex; align-items: flex-end; gap: 2px;
  height: 16px;
}
.card-eq span {
  width: 3px; border-radius: 1px;
  background: var(--accent);
}
.card-eq span:nth-child(1) { animation: eq1 0.7s ease-in-out infinite; }
.card-eq span:nth-child(2) { animation: eq2 0.7s ease-in-out infinite 0.12s; }
.card-eq span:nth-child(3) { animation: eq3 0.7s ease-in-out infinite 0.22s; }
.card-eq.paused span { animation-play-state: paused; }

.card-body { padding: 11px 13px 13px; }
.card-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.card-meta { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-card.is-playing .card-title { color: var(--accent); }

/* ─────────────────────────────────────────
   MINI PLAYER BAR (bottom)
───────────────────────────────────────── */
.mini-player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  background: rgba(22,22,22,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  display: none;
  flex-direction: column;
  gap: 8px;
  cursor: pointer;
}
.mini-player.visible { display: flex; }

.mini-top {
  display: flex; align-items: center; gap: 12px;
}
.mini-art {
  width: 44px; height: 44px;
  border-radius: 8px; object-fit: cover;
  background: var(--lift); flex-shrink: 0;
}
.mini-art-ph {
  width: 44px; height: 44px;
  border-radius: 8px; background: var(--lift);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.mini-info { flex: 1; min-width: 0; }
.mini-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-artist { font-size: 12px; color: var(--muted); }
.mini-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.mini-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background 0.15s;
}
.mini-btn:hover { background: var(--lift); }
.mini-play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform 0.15s;
}
.mini-play-btn:active { transform: scale(0.93); }
.mini-play-btn svg { color: #000; }

.mini-progress {
  width: 100%;
  height: 3px;
  background: var(--lift);
  border-radius: 2px;
  overflow: hidden;
}
.mini-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s linear;
}

/* ─────────────────────────────────────────
   FULL PLAYER MODAL
───────────────────────────────────────── */
.player-modal {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}
.player-modal.open { transform: translateY(0); }

.modal-bg-art {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(60px) brightness(0.25) saturate(1.8);
  transform: scale(1.1);
  transition: background-image 0.5s;
}

.modal-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100%;
  padding: env(safe-area-inset-top, 12px) 0 env(safe-area-inset-bottom, 0);
}

/* drag handle + top bar */
.modal-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  flex-shrink: 0;
}
.modal-drag {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: 0 auto;
}
.modal-close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: background 0.15s;
}
.modal-close-btn:hover { background: rgba(255,255,255,0.14); }
.modal-label {
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}

/* artwork */
.modal-art-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px 40px;
  min-height: 0;
}
.modal-art {
  width: 100%; max-width: 340px;
  aspect-ratio: 1;
  border-radius: 18px;
  object-fit: cover;
  background: var(--lift);
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  transition: transform 0.3s ease;
}
.modal-art.is-playing { transform: scale(1.03); }
.modal-art-ph {
  width: 100%; max-width: 340px;
  aspect-ratio: 1;
  border-radius: 18px;
  background: var(--lift);
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}

/* info */
.modal-info {
  padding: 0 28px;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px; letter-spacing: 0.03em; line-height: 1.05;
  color: var(--text);
}
.modal-artist { font-size: 15px; color: var(--muted); margin-top: 4px; }
.modal-genre-badge {
  background: rgba(212,240,74,0.12);
  color: var(--accent);
  font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
  margin-top: 6px;
}

/* progress */
.modal-progress-wrap { padding: 24px 28px 0; flex-shrink: 0; }
.modal-progress {
  width: 100%; height: 5px;
  -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.12);
  border-radius: 3px; outline: none; cursor: pointer;
}
.modal-progress::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--text);
  cursor: pointer; transition: transform 0.1s;
}
.modal-progress:hover::-webkit-slider-thumb { transform: scale(1.3); }
.modal-times {
  display: flex; justify-content: space-between;
  padding-top: 8px;
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* controls */
.modal-controls {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; padding: 20px 28px 8px;
  flex-shrink: 0;
}
.modal-ctrl {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.55);
  transition: all 0.15s;
}
.modal-ctrl:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.modal-ctrl.on { color: var(--accent); }
.modal-skip { color: var(--text); }
.modal-skip:hover { background: rgba(255,255,255,0.06); }
.modal-playpause {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
  flex-shrink: 0;
}
.modal-playpause:hover { transform: scale(1.05); }
.modal-playpause:active { transform: scale(0.96); }
.modal-playpause svg { color: #000; }
.modal-playpause .i-pause { display: none; }
.is-playing-modal .modal-playpause .i-play { display: none; }
.is-playing-modal .modal-playpause .i-pause { display: block; }

/* volume */
.modal-vol-row {
  display: flex; align-items: center; gap: 10px;
  padding: 0 28px 20px;
  flex-shrink: 0;
}
.modal-vol-row svg { color: var(--faint); flex-shrink: 0; }
input[type=range].vol {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.12); outline: none; cursor: pointer;
}
input[type=range].vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,0.5); cursor: pointer;
}

/* ─────────────────────────────────────────
   ANIMATIONS
───────────────────────────────────────── */
@keyframes eq1 { 0%,100%{height:4px} 50%{height:13px} }
@keyframes eq2 { 0%,100%{height:11px} 50%{height:4px} }
@keyframes eq3 { 0%,100%{height:7px} 33%{height:13px} 66%{height:3px} }

/* ─────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────── */
.empty {
  text-align: center; padding: 80px 20px;
  color: var(--faint);
}
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty h2 { font-size: 20px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
.empty p { font-size: 14px; line-height: 1.8; max-width: 320px; margin: 0 auto; }
.empty code {
  display: inline-block; background: var(--lift); color: var(--accent);
  font-family: monospace; font-size: 13px;
  padding: 2px 7px; border-radius: 4px; margin-top: 12px;
}
</style>
</head>
<body>

<!-- ─── AUDIO ─── -->
<audio id="audio"></audio>

<!-- ─── HEADER ─── -->
<header class="header">
  <span class="logo">JUGAS<em>TRACKS</em></span>
  <span class="header-sub" id="trackCount"></span>
</header>

<!-- ─── MAIN ─── -->
<main class="page">
  <p class="grid-label">Tracks</p>
  <div class="song-grid" id="grid"></div>
</main>

<!-- ─── MINI PLAYER ─── -->
<div class="mini-player" id="miniPlayer" onclick="openModal()">
  <div class="mini-top">
    <div class="mini-art-ph" id="miniArt">🎵</div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-artist" id="miniArtist">—</div>
    </div>
    <div class="mini-controls" onclick="event.stopPropagation()">
      <button class="mini-btn" onclick="prevTrack()" aria-label="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="mini-play-btn" id="miniPlayBtn" onclick="togglePlay()" aria-label="Play/Pause">
        <svg id="miniPlayIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="miniPauseIcon" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="mini-btn" onclick="nextTrack()" aria-label="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
  <div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
</div>

<!-- ─── FULL PLAYER MODAL ─── -->
<div class="player-modal" id="playerModal">
  <div class="modal-bg-art" id="modalBg"></div>
  <div class="modal-inner" id="modalInner">

    <div style="padding: 6px 20px 0; text-align:center;">
      <div class="modal-drag"></div>
    </div>
    <div class="modal-topbar">
      <button class="modal-close-btn" onclick="closeModal()" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
      </button>
      <span class="modal-label">Now Playing</span>
      <div style="width:36px"></div>
    </div>

    <div class="modal-art-wrap">
      <img class="modal-art" id="modalArt" src="" alt="" style="display:none">
      <div class="modal-art-ph" id="modalArtPh">🎵</div>
    </div>

    <div class="modal-info">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div class="modal-artist" id="modalArtist">—</div>
      </div>
      <div class="modal-genre-badge" id="modalGenre" style="display:none"></div>
    </div>

    <div class="modal-progress-wrap">
      <input type="range" class="modal-progress" id="modalProgress" min="0" max="100" value="0" oninput="seekTo(this.value)">
      <div class="modal-times">
        <span id="modalCurrent">0:00</span>
        <span id="modalDuration">0:00</span>
      </div>
    </div>

    <div class="modal-controls">
      <button class="modal-ctrl" id="shuffleBtn" onclick="toggleShuffle()" aria-label="Shuffle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zm4.76-.49 1.65 1.65L4 18.59 5.41 20 17.96 7.46l1.63 1.63L20 4l-4.65 4.68zM14.67 14l-1.41 1.41 2.87 2.88L14.5 20H20v-5.5l-1.74 1.74L14.67 14z"/></svg>
      </button>
      <button class="modal-ctrl modal-skip" onclick="prevTrack()" aria-label="Previous">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="modal-playpause" onclick="togglePlay()" aria-label="Play/Pause">
        <svg class="i-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="i-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="modal-ctrl modal-skip" onclick="nextTrack()" aria-label="Next">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
      </button>
      <button class="modal-ctrl" id="repeatBtn" onclick="toggleRepeat()" aria-label="Repeat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>

    <div class="modal-vol-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm7-.17v6.34L9.83 13H7v-2h2.83L12 8.83z"/></svg>
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════
   ▸ ADD YOUR SONGS HERE
   
   Each song needs:
     title    — song name (required)
     artist   — your name/alias (required)
     src      — path to audio file e.g. "songs/track1.mp3" (required)
     art      — path to cover image e.g. "covers/track1.jpg" (optional)
     genre    — genre label shown as badge (optional)
     year     — release year (optional)

   Example structure:
   { title: "Song Name", artist: "Juga", src: "songs/track1.mp3", art: "covers/track1.jpg", genre: "Hip-Hop", year: "2024" }
═══════════════════════════════════════ */
const SONGS = [
{ title: "Some Nights", artist: "Jugaa", src: "songs/somenights.mp3", art: "covers/somenights.jpg", genre: "House", year: "14/4/2026" },
{ title: "TN's Remix", artist: "Jugaa", src: "songs/TNS.mp3", art: "covers/TNSnew.jpg", genre: "House", year: "11/4/2026" },
{ title: "What a lie (bad version)", artist: "Jugaa", src: "songs/Whatalie.mp3", art: "covers/Whatalie.jpg", genre: "House", year: "9/4/2026" },
   { title: "Underground", artist: "Jugaa", src: "songs/underground.mp3", art: "covers/underground.jpg", genre: "House", year: "7/4/2026" },
   { title: "Tekkno", artist: "Jugaa", src: "songs/Tekkno.mp3", art: "covers/Tekkno.jpg", genre: "House/Techno", year: "4/4/2026" },
   { title: "randomshit", artist: "Jugaa", src: "songs/Randomshit.mp3", art: "covers/Randomshit.jpg", genre: "House", year: "3/4/2026" },

];
/* ══════════════════════════════════════ */

const ARTIST_NAME = "Juga"; // ← change this to your name

/* ─── state ─── */
const audio = document.getElementById('audio');
let current = -1;
let playing = false;
let shuffleOn = false;
let repeatOn = false;
let modalOpen = false;

/* ─── init ─── */
function init() {
  const tc = document.getElementById('trackCount');
  tc.textContent = SONGS.length + ' track' + (SONGS.length !== 1 ? 's' : '');
  audio.volume = 0.8;

  const grid = document.getElementById('grid');
  if (!SONGS.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🎵</div>
      <h2>No tracks yet</h2>
      <p>Open the HTML file and add your songs to the <strong>SONGS</strong> array at the top of the script.</p>
      <code>{ title, artist, src, art, genre, year }</code>
    </div>`;
    return;
  }

  grid.innerHTML = SONGS.map((s, i) => `
    <div class="song-card" id="card-${i}" onclick="selectAndOpen(${i})">
      <div class="card-art-wrap">
        ${s.art
          ? `<img class="card-art" src="${s.art}" alt="${s.title}" loading="lazy">`
          : `<div class="card-art-placeholder">🎵</div>`}
        <div class="card-overlay">
          <div class="card-play-icon" id="card-icon-${i}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="card-eq paused" id="card-eq-${i}" style="display:none">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${s.title}</div>
        <div class="card-meta">${s.artist}${s.year ? ' · ' + s.year : ''}</div>
      </div>
    </div>
  `).join('');
}

/* ─── select + open modal ─── */
function selectAndOpen(i) {
  if (current === i) {
    if (!modalOpen) openModal();
    else togglePlay();
    return;
  }
  loadTrack(i);
  openModal();
}

function loadTrack(i) {
  if (i < 0 || i >= SONGS.length) return;
  const prev = current;
  current = i;
  const s = SONGS[i];

  audio.src = s.src;
  audio.volume = document.getElementById('volSlider').value / 100;
  audio.play().catch(() => {});
  playing = true;

  updateCardStates(prev);
  updateMiniPlayer();
  updateModalContent();
  updateMediaSession();
  setPlayingVisuals(true);
}

/* ─── play/pause ─── */
function togglePlay() {
  if (current < 0) { if (SONGS.length) loadTrack(0); return; }
  if (audio.paused) { audio.play(); playing = true; }
  else { audio.pause(); playing = false; }
  setPlayingVisuals(playing);
}

/* ─── skip ─── */
function prevTrack() {
  if (!SONGS.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack((current - 1 + SONGS.length) % SONGS.length);
}
function nextTrack() {
  if (!SONGS.length) return;
  if (shuffleOn) {
    let n; do { n = Math.floor(Math.random() * SONGS.length); } while (SONGS.length > 1 && n === current);
    loadTrack(n);
  } else {
    loadTrack((current + 1) % SONGS.length);
  }
}

/* ─── shuffle / repeat ─── */
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('shuffleBtn').classList.toggle('on', shuffleOn);
}
function toggleRepeat() {
  repeatOn = !repeatOn;
  document.getElementById('repeatBtn').classList.toggle('on', repeatOn);
}

/* ─── seek / volume ─── */
function seekTo(v) { if (audio.duration) audio.currentTime = audio.duration * v / 100; }
function setVol(v) { audio.volume = v / 100; }

/* ─── audio events ─── */
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('modalProgress').value = pct;
  document.getElementById('miniProgressFill').style.width = pct + '%';
  document.getElementById('modalCurrent').textContent = fmt(audio.currentTime);
  document.getElementById('modalDuration').textContent = fmt(audio.duration);
});
audio.addEventListener('ended', () => {
  if (repeatOn) { audio.play(); return; }
  nextTrack();
});
audio.addEventListener('play',  () => { playing = true;  setPlayingVisuals(true); });
audio.addEventListener('pause', () => { playing = false; setPlayingVisuals(false); });

/* ─── modal ─── */
function openModal() {
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  modalOpen = true;
}
function closeModal() {
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow = '';
  modalOpen = false;
}

/* swipe down to close */
let touchStartY = 0;
document.getElementById('playerModal').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.getElementById('playerModal').addEventListener('touchmove', e => {
  const delta = e.touches[0].clientY - touchStartY;
  if (delta > 0) document.getElementById('playerModal').style.transform = `translateY(${delta}px)`;
}, { passive: true });
document.getElementById('playerModal').addEventListener('touchend', e => {
  const delta = e.changedTouches[0].clientY - touchStartY;
  document.getElementById('playerModal').style.transform = '';
  if (delta > 90) closeModal();
});

/* ─── update UI ─── */
function updateModalContent() {
  if (current < 0) return;
  const s = SONGS[current];
  document.getElementById('modalTitle').textContent = s.title;
  document.getElementById('modalArtist').textContent = s.artist;
  const genreEl = document.getElementById('modalGenre');
  if (s.genre) { genreEl.textContent = s.genre; genreEl.style.display = 'block'; }
  else genreEl.style.display = 'none';
  const artEl = document.getElementById('modalArt');
  const phEl = document.getElementById('modalArtPh');
  const bgEl = document.getElementById('modalBg');
  if (s.art) {
    artEl.src = s.art; artEl.style.display = 'block'; phEl.style.display = 'none';
    bgEl.style.backgroundImage = `url(${s.art})`;
  } else {
    artEl.style.display = 'none'; phEl.style.display = 'flex';
    bgEl.style.backgroundImage = '';
  }
}

function updateMiniPlayer() {
  if (current < 0) return;
  const s = SONGS[current];
  document.getElementById('miniPlayer').classList.add('visible');
  document.getElementById('miniTitle').textContent = s.title;
  document.getElementById('miniArtist').textContent = s.artist;
  const artEl = document.getElementById('miniArt');
  if (s.art) { artEl.outerHTML = `<img class="mini-art" id="miniArt" src="${s.art}" alt="">`; }
  else { if (artEl.tagName === 'IMG') { const ph = document.createElement('div'); ph.className = 'mini-art-ph'; ph.id = 'miniArt'; ph.textContent = '🎵'; artEl.replaceWith(ph); } }
}

function updateCardStates(prev) {
  if (prev >= 0) {
    document.getElementById('card-' + prev)?.classList.remove('is-playing');
    const eq = document.getElementById('card-eq-' + prev);
    if (eq) eq.style.display = 'none';
  }
  if (current >= 0) {
    document.getElementById('card-' + current)?.classList.add('is-playing');
    const eq = document.getElementById('card-eq-' + current);
    if (eq) { eq.style.display = 'flex'; eq.classList.remove('paused'); }
  }
}

function setPlayingVisuals(p) {
  /* modal */
  document.getElementById('modalInner').classList.toggle('is-playing-modal', p);
  document.getElementById('modalArt').classList.toggle('is-playing', p);
  /* mini player */
  document.getElementById('miniPlayIcon').style.display = p ? 'none' : 'block';
  document.getElementById('miniPauseIcon').style.display = p ? 'block' : 'none';
  /* card eq */
  const eq = current >= 0 ? document.getElementById('card-eq-' + current) : null;
  if (eq) { eq.style.display = current >= 0 ? 'flex' : 'none'; eq.classList.toggle('paused', !p); }
  /* card overlay icon */
  const icon = current >= 0 ? document.getElementById('card-icon-' + current) : null;
  if (icon) {
    icon.innerHTML = p
      ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
      : `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  }
}

/* ─── Media Session API (lock screen / notifications) ─── */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || current < 0) return;
  const s = SONGS[current];
  const artwork = s.art ? [{ src: s.art, sizes: '512x512', type: 'image/jpeg' }] : [];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.title,
    artist: s.artist || ARTIST_NAME,
    album: 'JUGASTRACKS.quest',
    artwork
  });
  navigator.mediaSession.setActionHandler('play',         () => { audio.play(); });
  navigator.mediaSession.setActionHandler('pause',        () => { audio.pause(); });
  navigator.mediaSession.setActionHandler('previoustrack',() => prevTrack());
  navigator.mediaSession.setActionHandler('nexttrack',    () => nextTrack());
  navigator.mediaSession.setActionHandler('seekto',       d => { if(d.seekTime) audio.currentTime = d.seekTime; });
}

/* ─── helpers ─── */
function fmt(s) {
  if (isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

init();
</script>
